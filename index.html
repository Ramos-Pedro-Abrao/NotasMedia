<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Calculo de Media</title>
</head>
<body>
    <header>
        <h1>RSnake <br>
        Marks</h1>
    </header>
    <form action="">
        <h1>Calculo de média</h1>
        <div class="input_area">
            <input type="text" id="disciplina" placeholder=" ">
            <label for="disciplina">Informe o nome da disciplina</label>
        </div>
        <div class="input_area">
            <input type="number" id="nota1" placeholder=" ">
            <label for="nota1">Informe a 1º nota</label>
        </div>
        <div class="input_area">
            <input type="number" id="nota2" placeholder=" ">
            <label for="nota2">Informe 2º nota</label>
        </div>
        <div class="input_area">
            <input type="number" id="nota3" placeholder=" ">
            <label for="nota3">Informe 3º nota</label>
        </div>
        <button id="calcBtn" type="button">Calcular média</button>
    </form>
    <section class="notas_e_medias" id="disciplinaArea">
        <!-- Cards de disciplinas serão inseridos aqui -->
    </section>

    <script src="./calculos.js"></script>
</body>
</html>
